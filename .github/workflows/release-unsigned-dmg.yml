name: Release Unsigned DMG

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      PROJECT: NotchPilot.xcodeproj
      SCHEME: NotchPilot
      APP_NAME: NotchPilot
      BUILD_ROOT: ${{ github.workspace }}/build
      DERIVED_DATA: ${{ github.workspace }}/build/DerivedData
      SOURCE_PACKAGES: ${{ github.workspace }}/build/SourcePackages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Resolve package dependencies
        run: |
          set -euo pipefail
          rm -rf "$BUILD_ROOT"
          mkdir -p "$BUILD_ROOT"

          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -derivedDataPath "$DERIVED_DATA" \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES"

      - name: Build unsigned release app
        run: |
          set -euo pipefail
          mkdir -p "$BUILD_ROOT"

          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA" \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Ad-hoc sign app bundle
        run: |
          set -euo pipefail

          APP_PATH="$DERIVED_DATA/Build/Products/Release/$APP_NAME.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app bundle not found at $APP_PATH" >&2
            exit 1
          fi

          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Package DMG
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          APP_PATH="$DERIVED_DATA/Build/Products/Release/$APP_NAME.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app bundle not found at $APP_PATH" >&2
            exit 1
          fi

          STAGING_DIR="$BUILD_ROOT/dmg-root"
          ARTIFACT_DIR="$BUILD_ROOT/artifacts"
          rm -rf "$STAGING_DIR" "$ARTIFACT_DIR"
          mkdir -p "$STAGING_DIR" "$ARTIFACT_DIR"

          cp -R "$APP_PATH" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"

          if [ "$REF_TYPE" = "tag" ]; then
            DMG_NAME="$APP_NAME-$REF_NAME-unsigned-arm64.dmg"
          else
            DMG_NAME="$APP_NAME-unsigned-arm64-run-$RUN_NUMBER.dmg"
          fi

          DMG_PATH="$ARTIFACT_DIR/$DMG_NAME"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DMG_NAME }}
          path: ${{ env.DMG_PATH }}
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$DMG_PATH" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$DMG_PATH" \
              --generate-notes \
              --title "$GITHUB_REF_NAME"
          fi
